<!doctype html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Massachusetts Crashes</title>

  <meta name="description" content="Interactive heatmap of motorist crashes in West Hartford Connecticut" />
  <meta name="author" content="Bike West Hartford" />

  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://www.googletagmanager.com" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tachyons/4.11.1/tachyons.min.css" integrity="sha512-d0v474klOFSF7qD9WDvyRxAvXaWSxCHDZdnBSZQjo8BpVr6vpjwAgqetpqkKP38DzlOzdVPaLVnzzW1Ba8wB9w==" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.min.css" integrity="sha512-1xoFisiGdy9nvho8EgXuXvnpR5GAMSjFwp40gSRE3NwdUdIMIKuPa7bqoUhLD0O/5tPNhteAsE5XyyMi5reQVA==" crossorigin="anonymous" />
  <link rel="stylesheet" href="./style.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js" integrity="sha512-rKFvwjvE4liWPlFnvH4ZhRDfNZ9FOpdkD/BU5gAIA3VS3vOQrQ5BjKgbO3kxebKhHdHcNUHLqxQYSoxee9UwgA==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js" integrity="sha512-KhIBJeCI4oTEeqOmRi2gDJ7m+JARImhUYgXWiOTIp9qqySpFUAJs09erGKem4E5IPuxxSTjavuurvBitBmwE0w==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js" integrity="sha512-bLT0Qm9VnAYZDflyKcBaQ2gg0hSYNQrJ8RilYldYQ1FxQYoCLtUjuuRuZo+fjqhx/qtq/1itJ0C2ejDxltZVFg==" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.sync@0.2.4/L.Map.Sync.min.js"></script>

</head>

<body class="helvetica">

  <!--
  <div class="fixed bottom-0 left-0 mb1 ml2 top-z-index">
    <a href="https://bikewesthartford.org/" class="dim">
      <img src="./img/bikewesthartford.png" alt="Bike West Hartford" class="o-100 h2" /></a>
    <a href="https://www.picturedigits.com" class="dim ml1">
      <img src="./img/picturedigits.png" alt="Picturedigits" class="o-70 w4" /></a>
  </div> -->


  <div id="map" class="vh-100 vw-100 bg-near-white"></div>

  <div id="legend" class="bg-white fixed top-0 left-0 pa3 mt2 ml2 br1 o-90 top-z-index">
    <h1 class="f3 mt0">Massachusetts Crash Map</h1>

    <form class="ph2">

      <div id="statsDashboard" class="stats-dashboard mt2 mb2">
        <div class="stat-card">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">Crashes selected</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statPed">0</div>
          <div class="stat-label">Involving pedestrians</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statCyc">0</div>
          <div class="stat-label">Involving cyclists</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statFatal">0</div>
          <div class="stat-label">With fatalities</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statInjury">0</div>
          <div class="stat-label">With injuries</div>
        </div>
      </div>

      <div id="filters" class="mt3 f6">

      <h5 class="f5 mb1 mt3">Select Planning Region</h5>
      <select id="rpaFilter" class="w-100 pa2 ba b--black-20 br2 mb2 bg-white">
        <option value="MAPC" selected="selected">Metropolitan Area Planning Council (MAPC)</option>
        <option value="SRPEDD">SRPEDD</option>
        <option value="PVPC">PVPC</option>
        <option value="OCPC">OCPC</option>
        <option value="CMRPC">CMRPC</option>
        <option value="MVPC">MVPC</option>
        <option value="CCC">CCC</option>
        <option value="NMCOG">NMCOG</option>
        <option value="MRPC">MRPC</option>
        <option value="BRPC">BRPC</option>
        <option value="FRCOG">FRCOG</option>
        <option value="NRPEDC">NRPEDC</option>
      </select>

      <div class="date-range-controls">
        <label>
          <b>From</b>
          <input type="date" id="dateFrom" />
        </label>
        <label>
          <b>To</b>
          <input type="date" id="dateTo" />
        </label>
      </div>

        <h5 class="f5 mb1 mt3">Show crashes as</h5>

        <div class="view-mode-toggle mt2">
          <label class="mr2">
            <input type="radio" name="viewMode" id="viewHeatmap" checked="checked" /> Heatmap clusters
            <span class="intensity-wrapper ml4">
              Adjust intensity <input type="range" value="10" min="1" max="30" id="intensity" class="v-mid" />
            </span>
          </label>
          <br/>
          <label>
            <input type="radio" name="viewMode" id="viewPoints" /> Symbol points
          </label>
        </div>

        <h5 class="f5 mb1 mt3">Crash involved</h5>

        <label>
          <input type="checkbox" id="pedestrians" />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="participant-icon" aria-hidden="true"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9 1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg>
          Pedestrians
        </label>

        <label>
          <input type="checkbox" id="cyclists" />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="participant-icon" aria-hidden="true"><path d="M15.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM5 12c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5S3.1 13.5 5 13.5s3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5zm5.8-10 2.4-2.4.8.8c1.3 1.3 3 2.1 5.1 2.1V9c-1.5 0-2.7-.6-3.6-1.5l-1.9-1.9c-.5-.4-1-.6-1.6-.6s-1.1.2-1.4.6L7.8 8.4c-.4.4-.6.9-.6 1.4 0 .6.2 1.1.6 1.4L11 14v5h2v-6l-2.2-2.5zM19 12c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5z"/></svg>
          Cyclists
        </label>

        <label>
          <input type="checkbox" id="vehiclesOnly" />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10" class="participant-icon participant-icon-dot" aria-hidden="true"><circle cx="5" cy="5" r="4"/></svg>
          Motorists only
        </label>

        <!-- Relabeled injury categories -->
        <h5 class="f5 mb1 mt3">
          Injuries
        </h5>

        <label>
          <input type="checkbox" id="fatalInjury" />
          <svg viewBox="0 0 10 10" class="participant-icon participant-icon-dot" aria-hidden="true" style="fill:#d73027"><circle cx="5" cy="5" r="4"/></svg>
          Fatality
        </label>
        <label>
          <input type="checkbox" id="anyInjury" />
          <svg viewBox="0 0 10 10" class="participant-icon participant-icon-dot" aria-hidden="true" style="fill:#fc8d59"><circle cx="5" cy="5" r="4"/></svg>
          Any Injury
        </label>
        <label>
          <input type="checkbox" id="propertyDamageOnly" />
          <svg viewBox="0 0 10 10" class="participant-icon participant-icon-dot" aria-hidden="true" style="fill:#74add1"><circle cx="5" cy="5" r="4"/></svg>
          Property damage only
        </label>

        <h5 class="f5 mb1 mt3">Roadways</h5>
        <label>
          <input type="checkbox" id="roadLocalState" checked="checked" /> Local and state roads
        </label>
        <label>
          <input type="checkbox" id="roadInterstate" class="ml2" checked="checked" /> Interstates
        </label>
        
        <br>

        <label>
          <input type="checkbox" id="labels" checked="checked" class="mt1" /> Show street labels
        </label>

      </div>

    </form>

  </div>

  <script src="./script.js"></script>

</body>

</html>
